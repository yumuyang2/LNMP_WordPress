version: '3'
services:
  php74:
    image: php:7.4-fpm
    container_name: php74
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./www:/var/www/html
      - ./config/php/php.ini:/usr/local/etc/php/php.ini
      - ./config/php/www.conf:/usr/local/etc/php-fpm.d/www.conf